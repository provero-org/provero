github:
  description: "Apache Assay - A vendor-neutral, declarative data quality engine with built-in anomaly detection"
  homepage: https://assay.apache.org
  labels:
    - data-quality
    - data-contracts
    - anomaly-detection
    - airflow
    - python
    - apache
  features:
    wiki: false
    issues: true
    projects: true
  enabled_merge_buttons:
    squash: true
    merge: false
    rebase: false
  protected_branches:
    main:
      required_pull_request_reviews:
        required_approving_review_count: 1
      required_status_checks:
        strict: true
notifications:
  commits: commits@assay.apache.org
  issues: issues@assay.apache.org
  pullrequests: reviews@assay.apache.org
