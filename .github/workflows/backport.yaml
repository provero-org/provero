name: Backport

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: korthout/backport-action@v3
        with:
          label_pattern: "^backport-to-(?<target>.*)$"
          pull_title: "[backport ${target_branch}] ${pull_title}"
