name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras --dev
      - run: uv run ruff check provero-core/src/ provero-core/tests/
      - run: uv run ruff format --check provero-core/src/ provero-core/tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --dev
      - run: uv run pytest provero-core/tests/ -v --cov=provero-core/src/provero --cov-report=term-missing

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras --dev
      - run: uv run mypy provero-core/src/provero/

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Apache license headers
        run: |
          missing=()
          while IFS= read -r f; do
            if ! head -5 "$f" | grep -q "Licensed to the Apache Software Foundation"; then
              missing+=("$f")
            fi
          done < <(find provero-core/src/provero provero-airflow/src/provero -name "*.py" -type f)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Files missing Apache license header:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All Python files have Apache license headers."

  changelog-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for news fragment
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^newsfragments/'; then
            echo "News fragment found."
            exit 0
          fi
          # Allow skipping for docs-only or CI-only changes
          changed=$(git diff --name-only origin/main...HEAD)
          if echo "$changed" | grep -qvE '\.(md|yml|yaml)$'; then
            echo "::error::Missing news fragment. Add a file to newsfragments/ (e.g. 42.feature.md)"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi
          echo "Docs/CI-only change, skipping changelog requirement."

  build-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras --dev
      - name: Build and verify wheel contents
        run: |
          uv build --package provero
          whl=$(ls dist/*.whl | head -1)
          uv run python -c "
          import zipfile, sys
          with zipfile.ZipFile('$whl') as z:
              names = z.namelist()
              required = ['provero/schema.json', 'provero/reporting/templates/report.html']
              for r in required:
                  matches = [n for n in names if n.endswith(r)]
                  if not matches:
                      print(f'MISSING from wheel: {r}')
                      sys.exit(1)
                  print(f'OK: {matches[0]}')
          print('Wheel contents verified.')
          "

  all-checks:
    if: always()
    needs: [lint, test, typecheck, license-check, build-verify]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more checks failed."
            exit 1
          fi
          echo "All checks passed."
