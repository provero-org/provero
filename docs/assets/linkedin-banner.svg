  <!-- Title -->
  <text x="480" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#F8FAFC" letter-spacing="-2">provero</text>

  <!-- Tagline -->
  <text x="480" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94A3B8" letter-spacing="0.5">Declarative data quality engine</text>

  <!-- Version badge -->
  <rect x="480" y="290" width="72" height="28" rx="14" fill="#059669" opacity="0.15"/>
  <text x="516" y="309" font-family="monospace" font-size="13" fill="#10B981" text-anchor="middle" font-weight="600">v0.2.1</text>

  <rect x="562" y="290" width="100" height="28" rx="14" fill="#D97706" opacity="0.1"/>
  <text x="612" y="309" font-family="monospace" font-size="13" fill="#D97706" text-anchor="middle" font-weight="600">Apache 2.0</text>

  <!-- Feature pills -->
  <g transform="translate(480, 350)">
    <rect x="0" y="0" width="130" height="32" rx="6" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1" stroke-opacity="0.2"/>
    <text x="65" y="21" font-family="monospace" font-size="12" fill="#10B981" text-anchor="middle">16 check types</text>

    <rect x="142" y="0" width="100" height="32" rx="6" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1" stroke-opacity="0.2"/>
    <text x="192" y="21" font-family="monospace" font-size="12" fill="#10B981" text-anchor="middle">YAML-first</text>

    <rect x="254" y="0" width="155" height="32" rx="6" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1" stroke-opacity="0.2"/>
    <text x="331" y="21" font-family="monospace" font-size="12" fill="#10B981" text-anchor="middle">anomaly detection</text>

    <rect x="421" y="0" width="130" height="32" rx="6" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1" stroke-opacity="0.2"/>
    <text x="486" y="21" font-family="monospace" font-size="12" fill="#10B981" text-anchor="middle">1M rows / 50ms</text>
  </g>

  <!-- Code snippet -->
  <g transform="translate(480, 410)">
    <rect width="580" height="150" rx="10" fill="#0B1120" stroke="rgba(16,185,129,0.1)" stroke-width="1"/>

    <!-- Terminal dots -->
    <circle cx="20" cy="16" r="4" fill="#EF4444" opacity="0.6"/>
    <circle cx="34" cy="16" r="4" fill="#F59E0B" opacity="0.6"/>
    <circle cx="48" cy="16" r="4" fill="#10B981" opacity="0.6"/>

    <text font-family="monospace" font-size="13" y="48" x="20">
      <tspan fill="#64748B">$</tspan>
      <tspan fill="#E2E8F0"> pip install provero</tspan>
    </text>
    <text font-family="monospace" font-size="13" y="72" x="20">
      <tspan fill="#64748B">$</tspan>
      <tspan fill="#E2E8F0"> provero init</tspan>
    </text>
    <text font-family="monospace" font-size="13" y="96" x="20">
      <tspan fill="#64748B">$</tspan>
      <tspan fill="#E2E8F0"> provero run</tspan>
    </text>
    <text font-family="monospace" font-size="13" y="130" x="20">
      <tspan fill="#10B981">Score: 100/100</tspan>
      <tspan fill="#64748B"> | 7 passed, 0 failed | 22ms</tspan>
    </text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="600" font-family="monospace" font-size="15" fill="#475569" text-anchor="middle">github.com/provero-org/provero</text>
</svg>
