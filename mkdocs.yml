site_name: Provero
site_url: https://provero-org.github.io/provero/
site_description: Vendor-neutral, declarative data quality engine.
repo_url: https://github.com/provero-org/provero
repo_name: provero-org/provero
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo-white.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [provero-core/src]
          options:
            show_source: false
            show_bases: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Check Types: checks.md
  - Connectors: connectors.md
  - Anomaly Detection: anomaly-detection.md
  - Data Contracts: data-contracts.md
  - Integrations:
    - Airflow: airflow.md
    - Flyte: flyte.md
  - CLI Reference: cli.md
  - API Reference:
      - api/index.md
      - Engine: api/engine.md
      - Optimizer: api/optimizer.md
      - SQL Utilities: api/sql.md
      - Checks: api/checks.md
      - Connectors: api/connectors.md
      - Compiler: api/compiler.md
      - Results: api/results.md
      - Contracts: api/contracts.md
      - Anomaly Detection: api/anomaly.md
      - Store: api/store.md
      - Profiler: api/profiler.md
      - Reporting: api/reporting.md
      - Alerts: api/alerts.md
  - Architecture: ARCHITECTURE.md
  - Release Process: RELEASE_PROCESS.md
