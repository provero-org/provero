[project]
name = "apache-assay"
version = "0.1.0-dev"
description = "A vendor-neutral, declarative data quality engine with built-in anomaly detection"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Apache Assay Contributors" },
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Framework :: Apache Airflow",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Software Development :: Testing",
]
keywords = ["data-quality", "data-contracts", "anomaly-detection", "airflow", "testing"]

dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0",
    "duckdb>=1.0",
    "rich>=13.0",
    "typer>=0.12",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]
snowflake = ["snowflake-sqlalchemy>=1.6"]
bigquery = ["sqlalchemy-bigquery>=1.11"]
redshift = ["sqlalchemy-redshift>=0.8"]
kafka = ["confluent-kafka>=2.3"]
anomaly = ["scipy>=1.11", "numpy>=1.26"]
prophet = ["prophet>=1.1"]
airflow = ["apache-airflow>=2.9"]
server = ["fastapi>=0.110", "uvicorn>=0.29"]
all = [
    "apache-assay[postgres,snowflake,bigquery,anomaly,server]",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "hypothesis>=6.100",
    "ruff>=0.4",
    "mypy>=1.10",
    "pre-commit>=3.7",
]

[project.scripts]
assay = "assay.cli.main:app"

[project.urls]
Homepage = "https://assay.apache.org"
Repository = "https://github.com/apache/assay"
Issues = "https://github.com/apache/assay/issues"
Documentation = "https://assay.apache.org/docs"

[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assay"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = [
    "E", "W",     # pycodestyle
    "F",           # pyflakes
    "I",           # isort
    "UP",          # pyupgrade
    "B",           # bugbear
    "SIM",         # simplify
    "RUF",         # ruff-specific
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
